<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yummy</title>
    <link rel="icon" href="./imgs/logo.png" type="image/png">

    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="bg-black">

    <!-- header -->
    <header class="">
        <div class="container ">
            <div class="row headerRow py-5 g-3">

            </div>
        </div>
    </header>
    <!-- end of header -->


    <!-- loading Screen -->
    <div class="loading position-fixed top-0 bottom-0 start-0 end-0 d-none justify-content-center align-items-center">
        <span class="loader"></span>
    </div>
    <!-- end of loading screen -->

    <!-- start of aside -->
    <aside>
        <div class="side position-fixed top-0 bottom-0">
            <div class="d-flex flex-column justify-content-between h-100">
                <ul class="list-unstyled ms-3 mt-5 text-white trans ">
                    <li class="pt-3 search">Search</li>
                    <li class="pt-3 category">Categories</li>
                    <li class="pt-3 area">Area</li>
                    <li class="pt-3 ingredients">Ingredients</li>
                    <li class="pt-3 contactUs">Contact US</li>
                </ul>
                <div class="footer mb-5 text-white ms-1">
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-twitter"></i>
                    <i class="fa-solid fa-globe"></i>
                    <p>Copyright © 2019 All Rights Reserved.</p>
                </div>
            </div>

            <div class="aside position-absolute d-flex flex-column justify-content-between align-items-center bg-white">
                <img src="./imgs/logo.png" class="w-75 mt-3" alt="" />
                <i class="fa-solid fa-x fs-1 d-none close-aside"></i>
                <i class="fa-solid fa-bars fs-1 open-aside"></i>
                <div class="mb-3">
                    <i class="fa-solid fa-globe"></i>
                    <i class="fa-solid fa-share-nodes"></i>
                </div>
            </div>
        </div>
    </aside>
    <!-- end of aside -->

    

        

    <script src="./JS/jquery-3.7.1.min.js"></script>
    <script src="./JS/bootstrap.bundle.min.js"></script>
    <script src="./JS/index.js"></script>
</body>
</html>
